name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  TI_SKIP_VERSION_CHECK: "ON"
  TI_OFFLINE_CACHE: "0"
  TI_ENABLE_OPENGL: "0"
  TI_ENABLE_VULKAN: "0"
  TI_ENABLE_CUDA: "0"
jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
  typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run mypy src/
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - name: Verify Taichi CPU backend
        run: uv run python -c "import taichi as ti; ti.init(arch=ti.cpu, offline_cache=False); print('Taichi CPU OK'); ti.reset()"
      - name: Run tests
        run: uv run pytest -m "not gpu and not slow" -v --forked || [ $? -eq 5 ]
  integration:
    runs-on: ubuntu-22.04
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest -m integration --timeout=120 -v || [ $? -eq 5 ]
